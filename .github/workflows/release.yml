name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binaries
        run: |
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o gitstreak-darwin-arm64 .
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o gitstreak-darwin-amd64 .
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o gitstreak-linux-amd64 .

          # Create tarballs for Homebrew
          tar -czf gitstreak-darwin-arm64.tar.gz gitstreak-darwin-arm64
          tar -czf gitstreak-darwin-amd64.tar.gz gitstreak-darwin-amd64
          tar -czf gitstreak-linux-amd64.tar.gz gitstreak-linux-amd64

          # Generate SHA256 checksums
          sha256sum gitstreak-darwin-arm64.tar.gz gitstreak-darwin-amd64.tar.gz gitstreak-linux-amd64.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gitstreak-darwin-arm64.tar.gz
            gitstreak-darwin-amd64.tar.gz
            gitstreak-linux-amd64.tar.gz
            checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
